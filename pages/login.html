<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo | Inmaculada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="login-card">
        <div class="brand-login">
            <i class="fas fa-shield-alt" style="color: #6366f1; font-size: 2.5rem; margin-bottom: 15px;"></i>
            <h1>Inmaculada</h1>
            <p style="color: #64748b; margin-bottom: 30px;">Panel de Administración</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="admin@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                <span>Ingresar al Panel</span>
            </button>
        </form>

        <a href="../home.html" class="back-home">
            <i class="fas fa-arrow-left"></i> Volver a la página principal
        </a>
        
        <div id="loginMessage" style="margin-top: 15px; font-size: 0.9rem; border-radius: 8px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../js/config.js"></script>
    
    <script>
        // Lógica de autenticación aislada para esta página
        const loginForm = document.getElementById('loginForm');
        const loginMessage = document.getElementById('loginMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            // Feedback visual de carga
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verificando...';
            btn.disabled = true;

            try {
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    loginMessage.innerHTML = `<p style="color: #ef4444; padding: 10px; background: #fee2e2; border-radius: 8px;">${error.message}</p>`;
                    btn.innerHTML = 'Ingresar al Panel';
                    btn.disabled = false;
                } else {
                    loginMessage.innerHTML = `<p style="color: #10b981; padding: 10px; background: #d1fae5; border-radius: 8px;">¡Acceso concedido! Redirigiendo...</p>`;
                    
                    // Guardamos sesión y redirigimos
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                }
            } catch (err) {
                console.error(err);
                btn.innerHTML = 'Ingresar al Panel';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
