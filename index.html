<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Inmaculada</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand"><i class="fas fa-leaf"></i> <span>Inmaculada</span></div>
        <nav>
            <a href="index.html" class="nav-item active"><i class="fas fa-th-large"></i> <span>Admin</span></a>
            <a href="pages/inmuebles.html" class="nav-item"><i class="fas fa-building"></i> <span>Ver Catálogo</span></a>
        </nav>
    </aside>

    <main class="content">
        <header class="header">
            <h1>Panel Administrativo</h1>
            <button class="btn-primary" id="btnNuevo">+ Nueva Propiedad</button>
        </header>
        <div class="grid-inmuebles" id="gridInmuebles"></div>
    </main>

    <div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:20px; width:90%; max-width:500px;">
            <h3>Nueva Propiedad</h3>
            <form id="formInmueble">
                <input type="text" id="titulo" placeholder="Título" style="width:100%; margin:10px 0; padding:10px;" required>
                <input type="number" id="precio" placeholder="Precio" style="width:100%; margin:10px 0; padding:10px;" required>
                <button type="submit" class="btn-primary" style="width:100%">Guardar</button>
                <button type="button" onclick="document.getElementById('modal').style.display='none'" style="width:100%; margin-top:10px; background:none; border:none; color:gray;">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
