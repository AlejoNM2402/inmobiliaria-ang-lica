<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmaculada | Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="logo-icon"><i class="fas fa-leaf"></i></div>
            <span>Inmobiliaria</span>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-item active">
                <i class="fas fa-th-large"></i> 
                <span>Panel Principal</span>
            </a>
            <a href="inmuebles.html" class="nav-item">
                <i class="fas fa-building"></i> 
                <span>Mis Inmuebles</span>
            </a>
            <div class="nav-separator"></div>
            <a href="#" class="nav-item disabled">
                <i class="fas fa-chart-pie"></i> 
                <span>Estadísticas</span>
            </a>
        </nav>
    </aside>

    <main class="content">
        <header class="header">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Buscar propiedad o código...">
            </div>
            <button class="btn-primary" id="btnNuevo"><i class="fas fa-plus"></i> Nueva Propiedad</button>
        </header>

        <section id="panel" class="view">
            <h2 class="section-title">Resumen de Inventario</h2>
            <div class="stats-container">
                <div class="card-stat blue"><h3>15</h3><p>Total Inmuebles</p></div>
                <div class="card-stat green"><h3>8</h3><p>Disponibles</p></div>
                <div class="card-stat purple"><h3>7</h3><p>En Proceso</p></div>
            </div>
            
            <h2 class="section-title">Administrar Propiedades</h2>
            <div class="grid-inmuebles" id="gridInmuebles">
                </div>
        </section>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Registrar Nueva Oferta</h3>
                <button class="close-modal">&times;</button>
            </div>
            <form id="formInmueble">
                <div class="form-body">
                    <div class="input-box">
                        <label>Nombre del Inmueble</label>
                        <input type="text" id="titulo" placeholder="Ej: Casa Campestre El Lago" required>
                    </div>
                    <div class="input-row">
                        <div class="input-box">
                            <label>Precio (COP)</label>
                            <input type="number" id="precio" placeholder="150000000" required>
                        </div>
                        <div class="input-box">
                            <label>Área</label>
                            <input type="text" id="area" placeholder="70m²">
                        </div>
                    </div>
                    <div class="drop-area" id="dropArea">
                        <input type="file" id="fileIn" hidden multiple accept="image/*">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Cargar imágenes</p>
                    </div>
                    <div class="preview-strip" id="previewStrip"></div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn-confirm">Guardar y Publicar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
